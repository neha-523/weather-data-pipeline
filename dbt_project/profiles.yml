weather_pipeline:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: /opt/airflow/data/warehouse.duckdb
      extensions:
        - httpfs
      settings:
        # Point DuckDB's S3 client at the local MinIO instance
        s3_endpoint: 'minio:9000'
        s3_access_key_id: 'minioadmin'
        s3_secret_access_key: 'minioadmin'
        s3_use_ssl: false
        s3_url_style: 'path'
