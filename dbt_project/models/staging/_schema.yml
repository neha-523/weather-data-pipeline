version: 2

models:
  - name: stg_weather_raw
    description: >
      Staged weather observations read from MinIO Parquet files (silver layer).
      One row per city per day.
    columns:
      - name: city_name
        description: "Name of the city"
        tests:
          - not_null
          - accepted_values:
              values: ['New York', 'London', 'Tokyo', 'Sydney', 'Mumbai']

      - name: weather_date
        description: "Date of the weather observation"
        tests:
          - not_null

      - name: temperature_max_c
        description: "Daily maximum temperature in Celsius"
        tests:
          - not_null

      - name: temperature_min_c
        description: "Daily minimum temperature in Celsius"
        tests:
          - not_null

      - name: precipitation_mm
        description: "Total daily precipitation in millimetres"

      - name: windspeed_max_kmh
        description: "Maximum daily wind speed in km/h"

      - name: ingested_date
        description: "Pipeline execution date when the record was ingested"
